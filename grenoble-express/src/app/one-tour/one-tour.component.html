<h2>Détails de la tournée</h2>

<table mat-table [dataSource]="[tournee]" class="mat-elevation-z8 table-custom">
  <!-- Colonne Nom de la tournée -->
  <ng-container matColumnDef="nom_tournee">
    <th mat-header-cell *matHeaderCellDef> Tournée </th>
    <td mat-cell *matCellDef="let tour"> {{ tour.nom_tournee }} </td>
  </ng-container>

  <!-- Colonne Livreurs -->
  <ng-container matColumnDef="livreurs">
    <th mat-header-cell *matHeaderCellDef> Livreurs </th>
    <td mat-cell *matCellDef="let tour"> {{ tour.livreurs }} </td>
  </ng-container>

  <!-- Colonne Camion -->
  <ng-container matColumnDef="camion">
    <th mat-header-cell *matHeaderCellDef> Camion </th>
    <td mat-cell *matCellDef="let tour"> {{ tour.camion }} </td>
  </ng-container>

  <!-- Colonne Date -->
  <ng-container matColumnDef="date">
    <th mat-header-cell *matHeaderCellDef> Date </th>
    <td mat-cell *matCellDef="let tour"> {{ tour.date }} </td>
  </ng-container>

  <!-- Ligne d'en-têtes -->
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<section class="button-container small-button">
    <a mat-raised-button href="https://www.youtube.com/watch?v=SdsSwvZ5B5k&list=RDSdsSwvZ5B5k&start_radio=1" target="_blank">voir la map</a>
</section>
